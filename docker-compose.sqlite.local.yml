name: codex2api-sqlite-local

services:
  codex2api:
    build: .
    container_name: codex2api-sqlite-local
    ports:
      - "${CODEX_PORT:-8090}:${CODEX_PORT:-8090}"
    env_file:
      - .env
    volumes:
      - sqlite-data-local:/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  sqlite-data-local:
    name: codex2api-sqlite-local_sqlite-data-local
