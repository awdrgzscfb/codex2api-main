name: codex2api-sqlite

services:
  codex2api:
    image: ghcr.io/awdrgzscfb/codex2api-main:latest
    container_name: codex2api-sqlite
    ports:
      - "${CODEX_PORT:-8090}:${CODEX_PORT:-8090}"
    env_file:
      - .env
    volumes:
      - sqlite-data:/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  sqlite-data:
    name: codex2api-sqlite_sqlite-data
